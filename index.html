<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Starry Sky Constellations</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="moon"></div>

  <h1>Starry Sky Constellations</h1>

  

  <!-- 🧩 Puzzle grid -->
  <div id="puzzle" class="puzzle-grid"></div>

  <!-- ✅ SCROLLABLE EXPLANATIONS BOX -->
  <div id="explanationsContainer"></div>
  
  <!-- 🎉 Modal -->
  <div id="roomModal" class="modal">
    <div class="modal-content">
      <h2>🎉 Puzzle Complete!</h2>
      <p>Enter your room number to record your completion:</p>
      <input type="text" id="roomInput" placeholder="e.g. Room 102">
      <button id="submitRoom">Submit</button>
    </div>
  </div>
  
  <script type="module" src="script.js"></script>
</body>
</html>
